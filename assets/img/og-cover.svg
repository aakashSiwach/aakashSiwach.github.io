<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Aakash Siwach — Software Development Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0f1424"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.85" cy="0.1" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- avatar -->
  <circle cx="965" cy="315" r="120" fill="url(#grad)"/>
  <text x="965" y="315" font-family="Inter, Arial, sans-serif" font-size="90" font-weight="900" fill="#04121a" text-anchor="middle" dominant-baseline="central">AS</text>
  <circle cx="965" cy="315" r="155" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-dasharray="6 10"/>

  <!-- text -->
  <text x="90" y="210" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#22d3ee" letter-spacing="6">OPEN TO OPPORTUNITIES</text>
  <text x="86" y="300" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900" fill="#e7ecf5">Aakash Siwach</text>
  <text x="90" y="370" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700" fill="url(#grad)">Full-Stack Software Development Engineer</text>
  <text x="90" y="430" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="500" fill="#9aa6bf">Java · Node.js · React · AWS · Microservices · 4+ yrs</text>

  <!-- chips -->
  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#e7ecf5">
    <rect x="90" y="478" width="150" height="52" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="165" y="512" text-anchor="middle">Backend</text>
    <rect x="256" y="478" width="160" height="52" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="336" y="512" text-anchor="middle">Full-Stack</text>
    <rect x="432" y="478" width="180" height="52" rx="26" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="522" y="512" text-anchor="middle">Cloud / AWS</text>
  </g>

  <text x="90" y="585" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#9aa6bf">aakashsiwach.github.io</text>
</svg>
